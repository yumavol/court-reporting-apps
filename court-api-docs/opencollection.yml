opencollection: 1.0.0

info:
  name: court-api-docs
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''

request:
  variables:
    - name: api_url
      value: http://localhost:8000
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
