info:
  name: List Jobs
  type: http

http:
  method: GET
  url: '{{api_url}}/api/jobs'
  auth: inherit
  params:
    - name: status
      value: ''
      enabled: false
      description: 'Filter by job status. Allowed: NEW, ASSIGNED, TRANSCRIBED, REVIEWED, COMPLETED'
    - name: locationType
      value: ''
      enabled: false
      description: 'Filter by job type. Allowed: PHYSICAL, REMOTE'

runtime:
  variables:
    - name: api_url
      value: http://localhost:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
