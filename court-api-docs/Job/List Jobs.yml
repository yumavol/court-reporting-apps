info:
  name: List Jobs
  type: http
  seq: 1

http:
  method: GET
  url: "{{api_url}}/api/jobs?status=NEW"
  params:
    - name: status
      value: NEW
      type: query
      description: "Filter by job status. Allowed: NEW, ASSIGNED, TRANSCRIBED, REVIEWED, COMPLETED"
    - name: locationType
      value: ""
      type: query
      description: "Filter by job type. Allowed: PHYSICAL, REMOTE"
      disabled: true
  auth: inherit

runtime:
  variables:
    - name: api_url
      value: http://localhost:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
