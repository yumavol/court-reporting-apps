info:
  name: List Reporters
  type: http
  seq: 1

http:
  method: GET
  url: "{{api_url}}/api/reporters?preferCity=New York"
  params:
    - name: preferCity
      value: New York
      type: query
  auth: inherit

runtime:
  variables:
    - name: api_url
      value: http://localhost:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
